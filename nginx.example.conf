# Пример Nginx конфигурации для advokat-tuapse.ru
# Этот файл НЕ должен попадать в Git, он только для справки.
# Вставьте соответствующий блок server {...} в /etc/nginx/sites-enabled/advokat-tuapse

server {
    listen 80;
    listen [::]:80;
    server_name advokat-tuapse.ru www.advokat-tuapse.ru;

    # Разрешаем загрузку файлов до 20 МБ (PDF-документы судебных решений)
    client_max_body_size 20m;
    client_body_timeout 120s;
    client_header_timeout 60s;

    location / {
        root /var/www/advokat-tuapse/dist;
        try_files $uri $uri/ /index.html;

        # Кэшируем статику браузером на 1 год
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # API бэкенда (Node.js на порту 5000)
    location /api/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Разрешаем большие файлы на уровне Nginx
        client_max_body_size 20m;
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
        proxy_request_buffering off;
    }

    # Загруженные PDF
    location /uploads/ {
        alias /var/www/advokat-tuapse/uploads/;
        expires 7d;
        add_header Cache-Control "public";
    }
}
